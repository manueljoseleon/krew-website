<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>KREW — La plataforma de contratación minera</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --ink: #0A0A0A;
    --ink-2: #1a1a1a;
    --muted: #555555;
    --muted-2: #8a8a8a;
    --line: #E8E8EA;
    --line-2: #F0F0F2;
    --bg: #FFFFFF;
    --bg-soft: #F7F8FA;
    --bg-soft-2: #F5F5F5;
    --blue: #1A6FFF;
    --blue-soft: #EAF1FF;
    --blue-deep: #0B2A6B;
    --yellow: #FFB800;
    --green: #16A34A;
    --green-soft: #DCFCE7;
    --amber-soft: #FEF3C7;
    --red: #DC2626;
    --radius: 16px;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--ink); }
  body {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    font-feature-settings: 'cv11', 'ss01', 'ss03';
    -webkit-font-smoothing: antialiased;
    line-height: 1.5;
    overflow-x: hidden;
  }
  h1, h2, h3, h4 { font-family: 'Space Grotesk', sans-serif; letter-spacing: -0.02em; margin: 0; }
  .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }
  a { color: inherit; text-decoration: none; }
  button { font-family: inherit; cursor: pointer; border: 0; background: none; padding: 0; }
  ::selection { background: var(--blue); color: white; }

  /* Layout */
  .container {
    max-width: 1240px;
    margin: 0 auto;
    padding: 0 32px;
  }
  @media (max-width: 720px) {
    .container { padding: 0 20px; }
  }

  /* Nav */
  .nav {
    position: sticky; top: 0; z-index: 50;
    background: rgba(255,255,255,0.82);
    backdrop-filter: saturate(180%) blur(14px);
    -webkit-backdrop-filter: saturate(180%) blur(14px);
    border-bottom: 1px solid transparent;
    transition: border-color .2s ease;
  }
  .nav.scrolled { border-bottom-color: var(--line); }
  .nav-inner { display: flex; align-items: center; justify-content: space-between; height: 68px; }
  .nav-links { display: flex; gap: 28px; }
  .nav-link {
    font-size: 14px; font-weight: 500; color: var(--ink-2);
    padding: 8px 2px; position: relative;
  }
  .nav-link:hover { color: var(--blue); }
  @media (max-width: 820px) {
    .nav-links { display: none; }
  }

  /* Buttons */
  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    font-weight: 600; font-size: 15px;
    padding: 12px 22px;
    border-radius: 999px;
    transition: transform .15s ease, background .15s ease, color .15s ease, box-shadow .15s ease;
    white-space: nowrap;
  }
  .btn:active { transform: translateY(1px); }
  .btn-dark { background: var(--ink); color: white; }
  .btn-dark:hover { background: #222; }
  .btn-blue { background: var(--blue); color: white; }
  .btn-blue:hover { background: #0e5fe6; box-shadow: 0 8px 24px -10px rgba(26,111,255,.55); }
  .btn-ghost { color: var(--blue); padding: 12px 6px; }
  .btn-ghost:hover { color: #0e5fe6; }
  .btn-arrow { transition: transform .15s ease; }
  .btn-ghost:hover .btn-arrow { transform: translateX(3px); }

  /* Logo */
  .logo { display: inline-flex; align-items: center; gap: 10px; }
  .logo-mark { width: 24px; height: 24px; }
  .logo-mark svg { display: block; }
  .logo-word {
    font-family: 'Space Grotesk', sans-serif; font-weight: 700;
    font-size: 22px; letter-spacing: -0.03em; color: var(--ink);
  }

  /* Sections */
  section { padding: 96px 0; position: relative; }
  @media (max-width: 720px) {
    section { padding: 64px 0; }
  }
  .eyebrow {
    display: inline-flex; align-items: center; gap: 8px;
    font-family: 'JetBrains Mono', monospace; font-size: 12px;
    color: var(--blue); text-transform: uppercase; letter-spacing: 0.08em;
    font-weight: 500;
    margin-bottom: 18px;
  }
  .eyebrow::before { content:""; width: 18px; height: 1px; background: var(--blue); display:inline-block; }
  .h2 {
    font-family: 'Space Grotesk', sans-serif; font-weight: 700;
    font-size: clamp(34px, 4vw, 48px); line-height: 1.05;
    letter-spacing: -0.025em;
    max-width: 18ch; text-wrap: balance;
  }
  .lead {
    font-size: 17px; color: var(--muted); max-width: 56ch;
    line-height: 1.55;
  }

  /* Reveal-on-scroll */
  .reveal { opacity: 0; transform: translateY(16px); transition: opacity .7s ease, transform .7s ease; }
  .reveal.in { opacity: 1; transform: none; }

  /* Hero */
  .hero { padding-top: 56px; padding-bottom: 80px; }
  .hero-grid {
    display: grid; grid-template-columns: 55fr 45fr; gap: 56px;
    align-items: center;
  }
  @media (max-width: 980px) {
    .hero-grid { grid-template-columns: 1fr; gap: 48px; }
  }
  .hero h1 {
    font-size: clamp(38px, 5.2vw, 60px);
    line-height: 1.02; letter-spacing: -0.03em;
    font-weight: 700;
    text-wrap: balance;
  }
  .hero h1 .accent { color: var(--blue); }
  .hero-sub { margin-top: 22px; max-width: 500px; font-size: 17px; color: var(--muted); line-height: 1.55; }
  .hero-ctas { margin-top: 32px; display: flex; align-items: center; gap: 18px; flex-wrap: wrap; }
  .hero-trust {
    margin-top: 40px; display: flex; align-items: center; gap: 16px;
    font-size: 13px; color: var(--muted-2);
  }
  .hero-trust .avatars { display: flex; }
  .hero-trust .avatars span {
    width: 26px; height: 26px; border-radius: 50%; border: 2px solid white;
    margin-left: -8px; font-size: 10px; font-weight: 600; color: white;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Space Grotesk', sans-serif;
  }
  .hero-trust .avatars span:first-child { margin-left: 0; }

  .hero-stage {
    position: relative; min-height: 580px;
    display: flex; align-items: center; justify-content: center;
  }
  .hero-stage::before {
    content:""; position: absolute; inset: -40px;
    background: radial-gradient(60% 50% at 60% 50%, rgba(26,111,255,0.10), rgba(26,111,255,0) 70%);
    z-index: 0;
  }
  .hero-stage::after {
    content:""; position: absolute; right: 4%; top: 8%; width: 220px; height: 220px;
    background: linear-gradient(135deg, rgba(255,184,0,0.18), transparent 70%);
    border-radius: 50%; filter: blur(40px); z-index: 0;
  }

  /* Phone */
  .phone {
    position: relative; width: 290px; height: 590px;
    background: #0a0a0a;
    border-radius: 42px;
    padding: 12px;
    box-shadow:
      0 50px 80px -30px rgba(0,0,0,0.35),
      0 30px 50px -25px rgba(26,111,255,0.25),
      0 0 0 1px rgba(0,0,0,0.1);
    z-index: 1;
  }
  .phone.tilt { transform: rotate(6deg); }
  .phone-screen {
    width: 100%; height: 100%;
    background: #F4F6FA;
    border-radius: 32px;
    overflow: hidden;
    position: relative;
  }
  .phone-notch {
    position: absolute; top: 8px; left: 50%; transform: translateX(-50%);
    width: 92px; height: 22px; background: #0a0a0a; border-radius: 14px; z-index: 5;
  }

  /* Laptop */
  .laptop {
    width: 100%; max-width: 720px;
    background: #1a1a1d;
    border-radius: 14px 14px 18px 18px;
    padding: 10px 10px 0;
    box-shadow: 0 40px 70px -30px rgba(0,0,0,0.35);
    position: relative;
  }
  .laptop::before {
    content:""; display:block; position: absolute; left: 50%; top: 3px;
    transform: translateX(-50%); width: 40px; height: 4px; background: #2a2a2d; border-radius: 4px;
  }
  .laptop-screen {
    background: #fff; border-radius: 6px; overflow: hidden; aspect-ratio: 16/10;
  }
  .laptop-base {
    height: 14px; background: linear-gradient(#2a2a2d, #1a1a1d);
    margin: 0 -10px -8px;
    border-radius: 0 0 18px 18px;
  }

  /* Card */
  .card {
    border: 1px solid var(--line);
    border-radius: var(--radius);
    background: white;
    transition: border-color .2s ease, transform .2s ease, box-shadow .2s ease;
  }
  .card:hover { border-color: #d4d4d6; }

  /* Problem cards */
  .problem-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px;
    margin-top: 64px;
  }
  @media (max-width: 880px) {
    .problem-grid { grid-template-columns: 1fr; }
  }
  .problem-card { padding: 28px; }
  .problem-icon {
    width: 44px; height: 44px; border-radius: 12px;
    background: var(--blue-soft); color: var(--blue);
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 24px;
  }
  .problem-card h3 {
    font-family: 'Space Grotesk', sans-serif; font-size: 19px; font-weight: 600;
    margin-bottom: 10px; letter-spacing: -0.01em;
  }
  .problem-card p { font-size: 15px; color: var(--muted); line-height: 1.55; margin: 0; }
  .problem-meta {
    margin-top: 20px; padding-top: 20px; border-top: 1px dashed var(--line);
    display: flex; justify-content: space-between; align-items: center;
    font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--muted-2);
  }
  .problem-meta strong { color: var(--ink); font-weight: 600; }

  /* Platform tabs */
  .platform {
    background: var(--bg-soft);
    border-top: 1px solid var(--line);
    border-bottom: 1px solid var(--line);
  }
  .platform-grid {
    display: grid; grid-template-columns: 380px 1fr; gap: 56px;
    margin-top: 56px; align-items: flex-start;
  }
  @media (max-width: 980px) {
    .platform-grid { grid-template-columns: 1fr; }
  }
  .tab-list { display: flex; flex-direction: column; gap: 4px; }
  .tab {
    text-align: left; padding: 18px 20px;
    border-radius: 12px;
    display: flex; gap: 16px; align-items: flex-start;
    transition: background .2s ease;
    position: relative;
  }
  .tab:hover { background: rgba(255,255,255,0.6); }
  .tab.active { background: white; box-shadow: 0 1px 0 var(--line), 0 4px 14px -8px rgba(0,0,0,0.06); }
  .tab-num {
    width: 28px; height: 28px; border-radius: 8px;
    background: #EDEEF1; color: var(--muted);
    font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 600;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    margin-top: 1px;
    transition: background .2s ease, color .2s ease;
  }
  .tab.active .tab-num { background: var(--blue); color: white; }
  .tab-body { min-width: 0; }
  .tab-title {
    font-family: 'Space Grotesk', sans-serif; font-weight: 600; font-size: 17px;
    color: var(--ink); margin-bottom: 4px;
    letter-spacing: -0.01em;
  }
  .tab.active .tab-title { color: var(--ink); }
  .tab-desc {
    font-size: 14px; color: var(--muted); line-height: 1.5;
    max-height: 0; opacity: 0; overflow: hidden;
    transition: max-height .35s ease, opacity .3s ease, margin-top .3s ease;
  }
  .tab.active .tab-desc { max-height: 120px; opacity: 1; margin-top: 8px; }

  .platform-canvas {
    background: white;
    border: 1px solid var(--line);
    border-radius: 20px;
    padding: 36px;
    min-height: 480px;
    display: flex; align-items: center; justify-content: center;
    position: relative;
    overflow: hidden;
  }
  .platform-canvas::before {
    content:""; position: absolute; inset: 0;
    background:
      radial-gradient(circle at 20% 0%, rgba(26,111,255,0.05), transparent 50%),
      linear-gradient(transparent 95%, rgba(0,0,0,0.04) 95%) 0 0 / 32px 32px,
      linear-gradient(90deg, transparent 95%, rgba(0,0,0,0.04) 95%) 0 0 / 32px 32px;
    pointer-events: none;
  }

  /* Stepper */
  .stepper {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 0;
    margin-top: 56px;
    position: relative;
  }
  .stepper::before {
    content:""; position: absolute; top: 32px; left: 12%; right: 12%; height: 1px;
    background: linear-gradient(90deg, transparent, var(--line) 10%, var(--line) 90%, transparent);
  }
  @media (max-width: 880px) {
    .stepper { grid-template-columns: 1fr; gap: 32px; }
    .stepper::before { display: none; }
  }
  .step { padding: 0 24px; position: relative; }
  .step-num {
    width: 64px; height: 64px; border-radius: 50%;
    background: white; border: 1px solid var(--line);
    font-family: 'Space Grotesk', sans-serif; font-weight: 600;
    font-size: 24px; color: var(--ink);
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 24px;
    position: relative; z-index: 1;
  }
  .step.done .step-num {
    background: var(--ink); color: white; border-color: var(--ink);
  }
  .step.active .step-num {
    background: var(--blue); color: white; border-color: var(--blue);
    box-shadow: 0 0 0 6px rgba(26,111,255,0.12);
  }
  .step h3 {
    font-family: 'Space Grotesk', sans-serif; font-size: 20px; font-weight: 600;
    margin-bottom: 8px; letter-spacing: -0.01em;
  }
  .step p { font-size: 15px; color: var(--muted); margin: 0; line-height: 1.55; }
  .step-mockup {
    margin-top: 24px; padding: 16px;
    background: white; border: 1px solid var(--line); border-radius: 12px;
    font-family: 'JetBrains Mono', monospace; font-size: 12px;
  }

  /* Audience */
  .audience {
    display: grid; grid-template-columns: 1fr 1fr; gap: 0;
    margin-top: 56px;
    border: 1px solid var(--line);
    border-radius: 20px;
    overflow: hidden;
  }
  @media (max-width: 880px) {
    .audience { grid-template-columns: 1fr; }
  }
  .audience-col { padding: 44px; }
  .audience-col + .audience-col {
    border-left: 1px solid var(--line);
  }
  @media (max-width: 880px) {
    .audience-col + .audience-col { border-left: 0; border-top: 1px solid var(--line); }
  }
  .audience-col.b { background: linear-gradient(180deg, #FAFBFD, white 60%); }
  .audience-icon {
    width: 48px; height: 48px; border-radius: 14px;
    background: var(--ink); color: white;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 24px;
  }
  .audience-col.b .audience-icon { background: var(--blue); }
  .audience h3 {
    font-family: 'Space Grotesk', sans-serif; font-size: 26px; font-weight: 600;
    margin-bottom: 8px; letter-spacing: -0.02em;
  }
  .audience-tag {
    display: inline-block; font-family: 'JetBrains Mono', monospace;
    font-size: 11px; color: var(--muted); margin-bottom: 16px;
    letter-spacing: 0.05em;
  }
  .check-list { list-style: none; padding: 0; margin: 28px 0; display: flex; flex-direction: column; gap: 14px; }
  .check-list li {
    display: flex; gap: 12px; align-items: flex-start;
    font-size: 15px; color: var(--ink-2);
  }
  .check-list .check {
    flex-shrink: 0; width: 22px; height: 22px; border-radius: 50%;
    background: var(--blue-soft); color: var(--blue);
    display: flex; align-items: center; justify-content: center;
    margin-top: 1px;
  }

  /* Metrics */
  .metrics {
    background: var(--bg-soft-2);
    border-top: 1px solid var(--line);
    border-bottom: 1px solid var(--line);
  }
  .metrics-grid {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px;
    margin-top: 48px;
  }
  @media (max-width: 880px) {
    .metrics-grid { grid-template-columns: repeat(2, 1fr); }
  }
  .metric { padding: 0; }
  .metric-num {
    font-family: 'Space Grotesk', sans-serif; font-weight: 700;
    font-size: clamp(48px, 5.5vw, 64px);
    color: var(--blue);
    line-height: 1; letter-spacing: -0.04em;
  }
  .metric-num .unit { color: var(--ink); font-size: 0.55em; margin-left: 4px; }
  .metric-label {
    margin-top: 12px;
    font-size: 14px; color: var(--muted); line-height: 1.4;
    max-width: 22ch;
  }

  /* Contact */
  .contact-wrap { max-width: 480px; margin: 48px auto 0; }
  .form-row { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
  .form-row label { font-size: 13px; font-weight: 500; color: var(--ink-2); }
  .form-row input {
    width: 100%; padding: 14px 16px;
    border: 1px solid var(--line); border-radius: 12px;
    font-family: inherit; font-size: 15px; color: var(--ink);
    background: white;
    transition: border-color .15s ease, box-shadow .15s ease;
  }
  .form-row input:focus {
    outline: 0; border-color: var(--blue);
    box-shadow: 0 0 0 4px rgba(26,111,255,0.12);
  }
  .form-row input.error { border-color: var(--red); }
  .form-row .err-msg { font-size: 12px; color: var(--red); margin-top: 2px; }
  .submit {
    width: 100%; margin-top: 12px;
    padding: 16px;
    background: var(--ink); color: white;
    border-radius: 999px;
    font-weight: 600; font-size: 15px;
    transition: background .15s ease;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .submit:hover { background: #222; }
  .submit:disabled { opacity: 0.6; cursor: not-allowed; }
  .form-note { font-size: 13px; color: var(--muted-2); text-align: center; margin-top: 16px; }
  .form-success {
    text-align: center; padding: 48px 32px;
    background: var(--blue-soft); border-radius: 16px;
  }
  .form-success-icon {
    width: 56px; height: 56px; border-radius: 50%;
    background: white; color: var(--blue);
    display: inline-flex; align-items: center; justify-content: center;
    margin-bottom: 16px;
  }

  /* Footer */
  footer {
    border-top: 1px solid var(--line);
    padding: 40px 0;
    font-size: 14px; color: var(--muted);
  }
  .footer-inner {
    display: flex; align-items: center; justify-content: space-between; gap: 24px;
    flex-wrap: wrap;
  }
  .footer-tag { color: var(--muted); }
  .footer-right { display: flex; align-items: center; gap: 24px; }

  /* Misc */
  .pill {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 6px 12px; border-radius: 999px;
    background: var(--blue-soft); color: var(--blue);
    font-size: 12px; font-weight: 500;
    font-family: 'JetBrains Mono', monospace;
  }
  .pill.dot::before {
    content:""; width: 6px; height: 6px; border-radius: 50%; background: var(--blue);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(1.4); }
  }
  .divider { height: 1px; background: var(--line); margin: 0; }

</style>
</head>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" data-presets="react">
// Visual mockups for KREW landing — Krew Passport phone, dashboards, etc.

const KrewLogo = ({ size = 24, color = '#0A0A0A' }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
    {/* vertical bar */}
    <rect x="2" y="2" width="4" height="20" fill={color} />
    {/* upper diagonal */}
    <path d="M22 2 L18 2 L6 11 L6 13.2 Z" fill={color} />
    {/* lower diagonal */}
    <path d="M6 10.8 L6 13 L18 22 L22 22 Z" fill={color} />
  </svg>
);

// =================== PHONE: KREW PASSPORT ===================
const PassportPhone = () => {
  const certs = [
    { name: 'ACHS — Curso Alturas', state: 'ok', exp: 'Vence 03/2027' },

// Procedural QR-like pattern
const QRPattern = () => {
  const cells = React.useMemo(() => {
    const arr = [];
    const seed = 17;
    for (let r = 0; r < 12; r++) {
      for (let c = 0; c < 12; c++) {
        // 3 corner finder squares
        const corner =
          (r < 3 && c < 3) || (r < 3 && c > 8) || (r > 8 && c < 3);
        const cornerInner = (r === 1 && c >= 1 && c <= 1) || false;
        if (corner) {
          const onEdge = r === 0 || c === 0 || r === 2 || c === 2 ||
            (r === 0 || c === 0 || r === 2 || c === 11 || c === 8) && false;
          const isEdge =
            ((r < 3 && c < 3) && (r === 0 || c === 0 || r === 2 || c === 2)) ||
            ((r < 3 && c > 8) && (r === 0 || c === 9 || r === 2 || c === 11)) ||
            ((r > 8 && c < 3) && (r === 9 || c === 0 || r === 11 || c === 2));
          const isCenter =
            ((r < 3 && c < 3) && r === 1 && c === 1) ||
            ((r < 3 && c > 8) && r === 1 && c === 10) ||
            ((r > 8 && c < 3) && r === 10 && c === 1);
          arr.push(isEdge || isCenter ? 1 : 0);
        } else {
          const v = Math.sin(r * 7.3 + c * 3.1 + seed) * 1000;
          arr.push(Math.floor(Math.abs(v)) % 2);
        }
      }
    }
    return arr;
  }, []);
  return (
    <svg viewBox="0 0 12 12" width="100%" height="100%" shapeRendering="crispEdges">
      {cells.map((v, i) => v ? <rect key={i} x={i%12} y={Math.floor(i/12)} width="1" height="1" fill="#0A0A0A" /> : null)}
    </svg>
  );
};

const Contact = () => {
  const [form, setForm] = useState({ nombre: '', empresa: '', rol: '', email: '' });
  const [errors, setErrors] = useState({});
  const [submitting, setSubmitting] = useState(false);
  const [done, setDone] = useState(false);

  const update = k => e => {
    setForm({ ...form, [k]: e.target.value });
    if (errors[k]) setErrors({ ...errors, [k]: null });
  };

  const validate = () => {
    const e = {};
    if (!form.nombre.trim()) e.nombre = 'Requerido';
    if (!form.empresa.trim()) e.empresa = 'Requerido';
    if (!form.rol.trim()) e.rol = 'Requerido';
    if (!form.email.trim()) e.email = 'Requerido';
    else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(form.email)) e.email = 'Email inválido';
    return e;
  };

  const submit = (ev) => {
    ev.preventDefault();
    const e = validate();
    if (Object.keys(e).length) { setErrors(e); return; }
    setSubmitting(true);
    setTimeout(() => { setSubmitting(false); setDone(true); }, 700);
  };

  return (

                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><polyline points="4 12 10 18 20 6"/></svg>

              <div style={{ marginTop: 8, color: '#555', fontSize: 14 }}>Nos contactamos en menos de 24 horas.</div>
            </div>
          ) : (
            <form onSubmit={submit} noValidate>
              {[
                { k: 'nombre',  l: 'Nombre completo',  p: 'María González' },
                { k: 'empresa', l: 'Empresa',          p: 'Minera o contratista' },
                { k: 'rol',     l: 'Rol / Cargo',      p: 'Gerente RRHH, Coordinador, etc.' },
                { k: 'email',   l: 'Email corporativo', p: 'maria@minera.cl' },
              ].map(f => (
                <div key={f.k} className="form-row" style={{ textAlign: 'left' }}>
                  <label htmlFor={f.k}>{f.l}</label>
                  <input id={f.k} type={f.k === 'email' ? 'email' : 'text'} placeholder={f.p}
                         value={form[f.k]} onChange={update(f.k)}
                         className={errors[f.k] ? 'error' : ''} />
                  {errors[f.k] && <span className="err-msg">{errors[f.k]}</span>}
                </div>
              ))}
              <button className="submit" type="submit" disabled={submitting}>
                {submitting ? 'Enviando…' : 'Enviar'}
                {!submitting && <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="13 5 19 12 13 19"/></svg>}
              </button>
              <div className="form-note">Nos contactamos en menos de 24 horas.</div>
            </form>
          )}
        </div>
      </div>
    </section>
  );
};

// ============ APP ============
const App = () => {
  // Scroll-reveal
  useEffect(() => {
    const els = document.querySelectorAll('.reveal');
    const io = new IntersectionObserver(entries => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          e.target.classList.add('in');
          io.unobserve(e.target);
        }
      });
    }, { threshold: 0.12, rootMargin: '0px 0px -40px 0px' });
    els.forEach(el => {
      if (!el.classList.contains('in')) io.observe(el);
    });
    return () => io.disconnect();
  }, []);

  return (
    <>
      <Nav />
      <Hero />
      <div className="divider container" style={{ height: 0, borderTop: '1px solid var(--line)' }}></div>
      <Problem />
      <Platform />
      <HowItWorks />
      <Audience />
      <Metrics />
      <Contact />
      <Footer />
    </>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

</script>
